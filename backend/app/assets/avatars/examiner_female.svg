<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8daf1"/>
      <stop offset="100%" stop-color="#e8b4cb"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#311910"/>
      <stop offset="100%" stop-color="#1a0b06"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <!-- Ambient Glow Ring -->
  <circle cx="200" cy="180" r="140" fill="none" stroke="rgba(225, 29, 46, 0.25)" stroke-width="2"/>
  
  <!-- Back Hair -->
  <path d="M 120 140 C 100 220 100 280 120 320 L 280 320 C 300 280 300 220 280 140 Z" fill="url(#hair)"/>

  <!-- Shoulders & Suit -->
  <path d="M 80 400 C 80 310 140 285 200 285 C 260 285 320 310 320 400 Z" fill="url(#suit)"/>
  <path d="M 175 285 L 200 340 L 225 285 Z" fill="#ffffff"/>
  <path d="M 192 340 L 200 400 L 208 340 Z" fill="#e11d2e"/>

  <!-- Neck -->
  <rect x="180" y="240" width="40" height="50" rx="10" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="200" cy="175" rx="68" ry="82" fill="url(#skin)"/>

  <!-- Front Hair Style -->
  <path d="M 132 165 C 130 110 160 90 200 90 C 240 90 270 110 268 165 C 255 125 230 115 200 115 C 170 115 145 125 132 165 Z" fill="url(#hair)"/>

  <!-- Eyebrows -->
  <path d="M 155 145 Q 170 140 182 146" fill="none" stroke="#2d150b" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 218 146 Q 230 140 245 145" fill="none" stroke="#2d150b" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="168" cy="160" rx="9" ry="6" fill="#ffffff"/>
  <circle cx="168" cy="160" r="4.5" fill="#2a1810"/>
  <circle cx="170" cy="158" r="1.5" fill="#ffffff"/>

  <ellipse cx="232" cy="160" rx="9" ry="6" fill="#ffffff"/>
  <circle cx="232" cy="160" r="4.5" fill="#2a1810"/>
  <circle cx="234" cy="158" r="1.5" fill="#ffffff"/>

  <!-- Nose -->
  <path d="M 198 165 Q 200 185 194 188 Q 200 190 206 188" fill="none" stroke="#d093aa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lips (Mouth Base) -->
  <path d="M 182 212 Q 200 206 218 212 Q 200 224 182 212 Z" fill="#d9687e"/>
  
  <!-- Headset Examiner Mic -->
  <path d="M 136 170 C 120 180 120 220 170 222" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="172" cy="222" r="5" fill="#0f172a"/>
</svg>
