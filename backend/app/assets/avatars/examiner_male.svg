<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="skin_m" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5ceb3"/>
      <stop offset="100%" stop-color="#e2aa86"/>
    </linearGradient>
    <linearGradient id="hair_m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="suit_m" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg_m)"/>

  <!-- Ambient Glow Ring -->
  <circle cx="200" cy="180" r="140" fill="none" stroke="rgba(59, 130, 246, 0.25)" stroke-width="2"/>

  <!-- Shoulders & Suit -->
  <path d="M 70 400 C 70 305 135 280 200 280 C 265 280 330 305 330 400 Z" fill="url(#suit_m)"/>
  <path d="M 170 280 L 200 345 L 230 280 Z" fill="#ffffff"/>
  <path d="M 194 345 L 200 400 L 206 345 Z" fill="#2563eb"/>

  <!-- Neck -->
  <rect x="178" y="235" width="44" height="55" rx="8" fill="url(#skin_m)"/>

  <!-- Head -->
  <ellipse cx="200" cy="172" rx="66" ry="80" fill="url(#skin_m)"/>

  <!-- Short Male Hair -->
  <path d="M 130 160 C 130 95 160 85 200 85 C 240 85 270 95 270 160 C 260 110 235 98 200 98 C 165 98 140 110 130 160 Z" fill="url(#hair_m)"/>

  <!-- Eyebrows -->
  <path d="M 152 142 Q 170 136 184 142" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M 216 142 Q 230 136 248 142" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/>

  <!-- Glasses -->
  <rect x="150" y="148" width="38" height="24" rx="4" fill="none" stroke="#334155" stroke-width="3"/>
  <rect x="212" y="148" width="38" height="24" rx="4" fill="none" stroke="#334155" stroke-width="3"/>
  <line x1="188" y1="158" x2="212" y2="158" stroke="#334155" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="169" cy="160" r="4.5" fill="#1e293b"/>
  <circle cx="171" cy="158" r="1.5" fill="#ffffff"/>
  <circle cx="231" cy="160" r="4.5" fill="#1e293b"/>
  <circle cx="233" cy="158" r="1.5" fill="#ffffff"/>

  <!-- Nose -->
  <path d="M 198 165 L 202 185 L 194 187" fill="none" stroke="#c48a66" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lips (Mouth Base) -->
  <path d="M 184 212 Q 200 208 216 212 Q 200 220 184 212 Z" fill="#c06d5a"/>

  <!-- Headset Examiner Mic -->
  <path d="M 136 170 C 120 180 120 220 170 222" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="172" cy="222" r="5" fill="#0f172a"/>
</svg>
